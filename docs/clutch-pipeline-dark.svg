<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 760" role="img" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Clutch detection pipeline</title>
<desc>Three-stage pipeline: presentCount establishes who was in the round, computeRealDeaths resolves which deaths were real versus undone by a revive (flagging genuinely undeterminable ones as unresolved), and detectClutch determines whether the tracked player became last-alive with enemies remaining and of what type.</desc>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="40" y="30" font-size="14" font-weight="600" fill="#adbac7">Step 1 · presentCount</text>
<rect x="240" y="44" width="200" height="56" rx="8" fill="#20203a" stroke="#8b80f0" stroke-width="0.6"/>
<text x="340" y="70" font-size="14" font-weight="500" fill="#c9c2ff" text-anchor="middle">Who was present?</text>
<text x="340" y="88" font-size="12" fill="#8b949e" text-anchor="middle">Excludes AFK / no-shows</text>
<line x1="340" y1="100" x2="340" y2="140" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

<text x="40" y="130" font-size="14" font-weight="600" fill="#adbac7">Step 2 · computeRealDeaths</text>
<rect x="240" y="144" width="200" height="56" rx="8" fill="#122436" stroke="#4c9be8" stroke-width="0.6"/>
<text x="340" y="170" font-size="14" font-weight="500" fill="#a9d3f5" text-anchor="middle">Revive possible?</text>
<text x="340" y="188" font-size="12" fill="#8b949e" text-anchor="middle">Clove self, or Sage on team</text>
<path d="M240,172 L194,172" fill="none" stroke="#8b949e" stroke-width="1.5"/>
<path d="M166,172 L120,172 L120,250" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="180" y="172" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">no</text>
<rect x="40" y="250" width="160" height="44" rx="8" fill="#16240f" stroke="#5fa634" stroke-width="0.6"/>
<text x="120" y="277" font-size="14" font-weight="500" fill="#b6e39a" text-anchor="middle">Death is real</text>
<line x1="340" y1="200" x2="340" y2="211" stroke="#8b949e" stroke-width="1.5"/>
<line x1="340" y1="229" x2="340" y2="240" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="340" y="220" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">yes</text>

<rect x="240" y="240" width="200" height="56" rx="8" fill="#122436" stroke="#4c9be8" stroke-width="0.6"/>
<text x="340" y="266" font-size="14" font-weight="500" fill="#a9d3f5" text-anchor="middle">Later snapshot?</text>
<text x="340" y="284" font-size="12" fill="#8b949e" text-anchor="middle">Kill, plant or defuse loc</text>
<path d="M440,258 L455,258" fill="none" stroke="#8b949e" stroke-width="1.5"/>
<path d="M545,258 L560,258 L560,180" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="500" y="258" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">alive again</text>
<rect x="480" y="140" width="160" height="40" rx="8" fill="#24211b" stroke="#8b949e" stroke-width="0.6"/>
<text x="560" y="165" font-size="14" font-weight="500" fill="#d5d5cf" text-anchor="middle">Revived — skip</text>
<line x1="340" y1="296" x2="340" y2="307" stroke="#8b949e" stroke-width="1.5"/>
<line x1="340" y1="325" x2="340" y2="336" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="340" y="316" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">not in it</text>
<rect x="260" y="336" width="160" height="40" rx="8" fill="#16240f" stroke="#5fa634" stroke-width="0.6"/>
<text x="340" y="361" font-size="14" font-weight="500" fill="#b6e39a" text-anchor="middle">Death is real</text>

<path d="M240,268 L240,320 L172,320" fill="none" stroke="#8b949e" stroke-width="1.5"/>
<path d="M88,320 L20,320 L20,395 L90,395 L90,410" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="130" y="320" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">no snapshot</text>
<rect x="30" y="410" width="220" height="72" rx="8" fill="#122436" stroke="#4c9be8" stroke-width="0.6"/>
<text x="140" y="434" font-size="14" font-weight="500" fill="#a9d3f5" text-anchor="middle">Fallbacks settle it?</text>
<text x="140" y="453" font-size="12" fill="#8b949e" text-anchor="middle">Elim wipe · no Sage ·</text>
<text x="140" y="469" font-size="12" fill="#8b949e" text-anchor="middle">Clove timing bound</text>
<line x1="140" y1="482" x2="140" y2="493" stroke="#8b949e" stroke-width="1.5"/>
<line x1="140" y1="511" x2="140" y2="522" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="140" y="502" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">yes</text>
<rect x="60" y="522" width="160" height="40" rx="8" fill="#16240f" stroke="#5fa634" stroke-width="0.6"/>
<text x="140" y="547" font-size="14" font-weight="500" fill="#b6e39a" text-anchor="middle">Death is real</text>
<line x1="250" y1="446" x2="264" y2="446" stroke="#8b949e" stroke-width="1.5"/>
<line x1="290" y1="446" x2="300" y2="446" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="277" y="446" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">no</text>
<rect x="300" y="418" width="180" height="56" rx="8" fill="#2b2109" stroke="#d9a441" stroke-width="0.6"/>
<text x="390" y="444" font-size="14" font-weight="500" fill="#f0cf8f" text-anchor="middle">Unresolved</text>
<text x="390" y="462" font-size="12" fill="#8b949e" text-anchor="middle">provisional real + flag</text>

<path d="M340,376 L340,395 L270,395 L270,495 L340,495 L340,600" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

<text x="40" y="590" font-size="14" font-weight="600" fill="#adbac7">Step 3 · detectClutch</text>
<rect x="240" y="600" width="200" height="56" rx="8" fill="#0f2620" stroke="#3fae8c" stroke-width="0.6"/>
<text x="340" y="626" font-size="14" font-weight="500" fill="#a8e6d2" text-anchor="middle">Last teammate down?</text>
<text x="340" y="644" font-size="12" fill="#8b949e" text-anchor="middle">Enemies alive → type 1v1–1v5</text>
<line x1="440" y1="628" x2="464" y2="628" stroke="#8b949e" stroke-width="1.5"/>
<line x1="490" y1="628" x2="510" y2="628" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="477" y="628" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">no</text>
<rect x="510" y="606" width="140" height="44" rx="8" fill="#24211b" stroke="#8b949e" stroke-width="0.6"/>
<text x="580" y="633" font-size="14" font-weight="500" fill="#d5d5cf" text-anchor="middle">No clutch</text>
<line x1="340" y1="656" x2="340" y2="666" stroke="#8b949e" stroke-width="1.5"/>
<line x1="340" y1="684" x2="340" y2="694" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
<text x="340" y="675" font-size="12" fill="#adbac7" text-anchor="middle" dy="0.32em">yes</text>
<rect x="260" y="694" width="160" height="44" rx="8" fill="#0f2620" stroke="#3fae8c" stroke-width="0.6"/>
<text x="340" y="712" font-size="14" font-weight="500" fill="#a8e6d2" text-anchor="middle">Clutch detected</text>
<text x="340" y="729" font-size="12" fill="#8b949e" text-anchor="middle">type 1v1–1v5</text>
</svg>
