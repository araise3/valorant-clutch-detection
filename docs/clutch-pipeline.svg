<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 760" role="img" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Clutch detection pipeline</title>
<desc>Three-stage pipeline: presentCount establishes who was in the round, computeRealDeaths resolves which deaths were real versus undone by a revive (flagging genuinely undeterminable ones as unresolved), and detectClutch determines whether the tracked player became last-alive with enemies remaining and of what type.</desc>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="40" y="30" font-size="14" font-weight="600" fill="#3d3d3a">Step 1 · presentCount</text>
<rect x="240" y="44" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text x="340" y="70" font-size="14" font-weight="500" fill="#26215c" text-anchor="middle">Who was present?</text>
<text x="340" y="88" font-size="12" fill="#73726c" text-anchor="middle">Excludes AFK / no-shows</text>
<line x1="340" y1="100" x2="340" y2="140" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>

<text x="40" y="130" font-size="14" font-weight="600" fill="#3d3d3a">Step 2 · computeRealDeaths</text>
<rect x="240" y="144" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
<text x="340" y="170" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Revive possible?</text>
<text x="340" y="188" font-size="12" fill="#73726c" text-anchor="middle">Clove self, or Sage on team</text>
<text x="150" y="218" font-size="12" fill="#73726c">no</text>
<path d="M240,172 L120,172 L120,250" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="40" y="250" width="160" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
<text x="120" y="277" font-size="14" font-weight="500" fill="#27500A" text-anchor="middle">Death is real</text>
<text x="352" y="218" font-size="12" fill="#73726c">yes</text>
<line x1="340" y1="200" x2="340" y2="240" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="240" y="240" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
<text x="340" y="266" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Later snapshot?</text>
<text x="340" y="284" font-size="12" fill="#73726c" text-anchor="middle">Kill, plant or defuse loc</text>
<text x="470" y="256" font-size="12" fill="#73726c">alive again</text>
<path d="M440,258 L560,258 L560,180" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="480" y="140" width="160" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
<text x="560" y="165" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">Revived — skip</text>
<text x="352" y="314" font-size="12" fill="#73726c">not in it</text>
<line x1="340" y1="296" x2="340" y2="336" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="260" y="336" width="160" height="40" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
<text x="340" y="361" font-size="14" font-weight="500" fill="#27500A" text-anchor="middle">Death is real</text>

<text x="140" y="360" font-size="12" fill="#73726c">no snapshot</text>
<path d="M240,268 L70,268 L70,410" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="30" y="410" width="220" height="72" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
<text x="140" y="434" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Fallbacks settle it?</text>
<text x="140" y="453" font-size="12" fill="#73726c" text-anchor="middle">Elim wipe · no Sage ·</text>
<text x="140" y="469" font-size="12" fill="#73726c" text-anchor="middle">Clove timing bound</text>
<text x="150" y="506" font-size="12" fill="#73726c">yes</text>
<line x1="140" y1="482" x2="140" y2="522" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="60" y="522" width="160" height="40" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
<text x="140" y="547" font-size="14" font-weight="500" fill="#27500A" text-anchor="middle">Death is real</text>
<text x="300" y="442" font-size="12" fill="#73726c">no</text>
<line x1="250" y1="446" x2="300" y2="446" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="300" y="418" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text x="390" y="444" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Unresolved</text>
<text x="390" y="462" font-size="12" fill="#73726c" text-anchor="middle">provisional real + flag</text>

<path d="M340,376 L340,600" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>

<text x="40" y="590" font-size="14" font-weight="600" fill="#3d3d3a">Step 3 · detectClutch</text>
<rect x="240" y="600" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text x="340" y="626" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Last teammate down?</text>
<text x="340" y="644" font-size="12" fill="#73726c" text-anchor="middle">Enemies alive → type 1v1–1v5</text>
<text x="470" y="620" font-size="12" fill="#73726c">no</text>
<line x1="440" y1="628" x2="510" y2="628" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="510" y="606" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
<text x="580" y="633" font-size="14" font-weight="500" fill="#444441" text-anchor="middle">No clutch</text>
<text x="352" y="676" font-size="12" fill="#73726c">yes</text>
<line x1="340" y1="656" x2="340" y2="694" stroke="#73726c" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="260" y="694" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text x="340" y="712" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Clutch detected</text>
<text x="340" y="729" font-size="12" fill="#73726c" text-anchor="middle">type 1v1–1v5</text>
</svg>
